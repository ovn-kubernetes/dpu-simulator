apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dpu-sim-device-plugin
  namespace: kube-system
  labels:
    app: dpu-sim-device-plugin
spec:
  selector:
    matchLabels:
      app: dpu-sim-device-plugin
  template:
    metadata:
      labels:
        app: dpu-sim-device-plugin
    spec:
      # Only run on nodes labeled as DPU-host workers.
      nodeSelector:
        k8s.ovn.org/dpu-host: ""
      hostNetwork: true
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: device-plugin
          image: DPU_SIM_DP_IMAGE
          imagePullPolicy: IfNotPresent
          env:
            - name: MGMT_PORT_VFS_COUNT
              value: "DPU_SIM_MGMT_PORT_VFS_COUNT"
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin-socket
              mountPath: /var/lib/kubelet/device-plugins
            - name: device-info
              mountPath: /var/run/k8s.cni.cncf.io/devinfo/dp
      volumes:
        - name: device-plugin-socket
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: device-info
          hostPath:
            path: /var/run/k8s.cni.cncf.io/devinfo/dp
            type: DirectoryOrCreate
