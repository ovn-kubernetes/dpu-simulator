# DPU Simulator Configuration - Kind DPU Offload Mode for CI
#
# Identical to config-kind-ovnk-offload.yaml but with TFT tests split out.
# The called workflow passes a separate TFT config.

networks:
  - name: "host-to-dpu-link"
    type: "HostToDpu"
    num_pairs: 16
    gateway_subnet: "172.30.0.0/24"
    mgmt_port_vfs_count: 3

kind:
  nodes:
    - name: "control-plane-host"
      k8s_role: "control-plane"
      k8s_cluster: "dpu-sim-host"
    - name: "control-plane-dpu"
      k8s_role: "control-plane"
      k8s_cluster: "dpu-sim-dpu"
    - name: "host-1-1"
      type: host
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-host"
    - name: "dpu-1-1"
      type: dpu
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-dpu"
      host: "host-1-1"
    - name: "host-2-1"
      type: host
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-host"
    - name: "dpu-2-1"
      type: dpu
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-dpu"
      host: "host-2-1"

kubernetes:
  version: "1.33"
  offload_dpu: true
  clusters:
    - name: "dpu-sim-host"
      # OVN-Kubernetes DPU mode defaults host subnet allocation to /24, so
      # this CIDR must be broader than /24 unless written as CIDR/hostPrefix.
      pod_cidr: "10.244.0.0/16"
      service_cidr: "10.245.0.0/16"
      cni: "ovn-kubernetes"
      addons:
        - multus

    - name: "dpu-sim-dpu"
      pod_cidr: "10.246.0.0/16"
      service_cidr: "10.247.0.0/16"
      cni: "flannel"
      addons:
        - multus

registry:
  enabled: false
  containers:
    - name: "ovn-kube"
      cni: "ovn-kubernetes"
      tag: "ovn-kube:dpu-sim"
